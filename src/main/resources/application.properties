# ============================================
# News Analyzer Configuration
# ============================================

# Server Settings
server.port=8888
summary.interval.seconds=10

# Queue Settings
queue.capacity=1000

# Thread Pool Settings
thread.core.pool.size=5
thread.max.pool.size=20
thread.keep.alive.seconds=60

# Validation / Filter Settings
positive.words=up,rise,good,success,high
news.allowed.words=up,down,rise,fall,good,bad,success,failure,high,low
headline.min.words=3
headline.max.words=5

# Client Settings
feed.id=feed-local
feed.host=localhost
feed.interval.millis=1000
feed.reconnect.initial.millis=1000
feed.reconnect.max.millis=30000
feed.reconnect.jitter.millis=500
